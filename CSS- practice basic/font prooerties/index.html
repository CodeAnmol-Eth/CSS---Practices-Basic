<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font properties</title>
    <style>
        h1{
            font-family:cursive;

        }
        #arial{
            font-family:  Helvetica, sans-serif;
        }

        #serifs{
            font-family: serif;

        }
        #sans-serif{
            font-family: sans-serif;
        }
        #cursive{
            font-family: cursive;

        }
        #monospace{
            font-family: monospace;
        }
        #fantasy{
            font-family: fantasy;
        }
    </style>
</head>
<body>
    <h1>Font family </h1>
   <p id="helvetica">Helvatica </p> 
   <p id="arial">Arial</p> 
   <p id="serifs">Serif</p>
   <p id="sans-serif">Sans-seirfs</p>
   <p id="cursive">cursive</p>
   <p id="monospace">Monospace</p>
   <p id="fantasy">Fantasy</p>
   

</body>
</html>
