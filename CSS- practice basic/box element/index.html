<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box design</title>
    <style>
        #box {
            height: 200px;
            width: 200px;
            border-radius: 0.2cm;
            background-color: rebeccapurple;
            border: 10px solid rgb(11, 22, 16);
            padding: 20px;

        }

        #box2 {
            height: 200px;
            width: 200px;
            border-radius: 0.2cm;
            background-color: red;
            border: 20px solid black;
            border-top: 10px solid black;
            border-bottom: 10px solid black;
            margin-left: 250px;

        }

        #box3 {
            height: 200px;
            width: 200px;
            border-radius: 0.2cm;
            background-color: rgb(171, 205, 232);
            border: 10px solid rgb(23, 36, 29);
            margin-left: 40px;

        }
    </style>
</head>

<body>
    <div id="box"> Lorem ipsum dolor, sit amet consectetur adipisicing elit. Amet ut minus odio maxime, aliquam ipsam
        commodi atque consequatur velit quam inventore, magnam dicta eum !</div>


    <div id="box2">

    </div>


    <div id="box3">


    </div>
</body>

</html>
